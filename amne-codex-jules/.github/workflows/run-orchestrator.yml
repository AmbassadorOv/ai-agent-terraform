name: Run AMNE Orchestrator

on:
  push:
    paths:
      - 'configs/**'
      - 'orchestrator/**'
      - 'bridge/**'
      - 'simulator/**'
  workflow_dispatch:

jobs:
  run:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run Codex Bridge Validation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python bridge/codex_bridge_runner.py --input uploads/latest.json --config codex_bridge_config.json
      - name: Run Orchestrator
        run: python orchestrator/amne_experiments_orchestrator.py --config configs/amne_config.json --versions 3,10,100,300,1000
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amne-outputs
          path: outputs/
