apiVersion: v1
kind: ServiceAccount
metadata:
  name: jules-audit-sa
  namespace: infra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jules-audit-role
  namespace: infra
rules:
- apiGroups: [""]
  resources: ["pods","configmaps"]
  verbs: ["get","list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jules-audit-binding
  namespace: infra
subjects:
- kind: ServiceAccount
  name: jules-audit-sa
  namespace: infra
roleRef:
  kind: Role
  name: jules-audit-role
  apiGroup: rbac.authorization.k8s.io
